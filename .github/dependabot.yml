# yaml-language-server: $schema=https://www.schemastore.org/dependabot-2.0.json
# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
---
version: 2

multi-ecosystem-groups:
  maintenance:
    schedule: { interval: monthly }
    open-pull-requests-limit: 1
    commit-message: { prefix: chore, include: scope }

updates:
  # Python runtime + stubs (root pyproject.toml + uv.lock workspace)
  - package-ecosystem: uv
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: maintenance
    cooldown: { default-days: 7 }

  # JS tooling (root package.json + bun.lock)
  - package-ecosystem: bun
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: maintenance
    cooldown: { default-days: 7 }

  # GitHub Actions used by workflows under .github/workflows
  - package-ecosystem: github-actions
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: maintenance
    cooldown: { default-days: 7 }

  # Test images (tests/Dockerfile.test, tests/Dockerfile.vaultwarden)
  - package-ecosystem: docker
    directory: /tests
    patterns: ["*"]
    multi-ecosystem-group: maintenance
    cooldown: { default-days: 7 }

  # Test orchestration (tests/docker-compose.yml)
  - package-ecosystem: docker-compose
    directory: /tests
    patterns: ["*"]
    multi-ecosystem-group: maintenance
    cooldown: { default-days: 7 }
