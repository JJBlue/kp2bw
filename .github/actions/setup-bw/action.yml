# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
---
name: Setup Bitwarden CLI
description: Install the Bitwarden CLI from npm.
author: Kaj Kowalski
branding: { icon: lock, color: blue }

inputs:
  version:
    description: "Bitwarden CLI version to install: `latest` (default), exact pin (`v?2026.5.0`), or npm dist-tag."
    default: latest

outputs:
  version:
    description: "Concrete installed Bitwarden CLI version."
    value: ${{ steps.install.outputs.version }}
  bin-dir:
    description: "npm global bin directory containing `bw` (added to PATH)."
    value: ${{ steps.install.outputs.bin-dir }}
  bin:
    description: "Absolute path to the installed `bw` executable."
    value: ${{ steps.install.outputs.bin }}

runs:
  using: composite
  steps:
    - id: install
      name: Install Bitwarden CLI
      shell: pwsh
      env: { BW_VERSION: "${{ inputs.version }}" }
      run: |
        $requested = $env:BW_VERSION

        # Accept only an exact version or a known npm dist-tag. Anything else
        # (git/url/file/tarball specs) is refused so a hostile `version` input
        # cannot redirect the install to an arbitrary source.
        if ([string]::IsNullOrWhiteSpace($requested)) {
        	$package = "@bitwarden/cli"
        } else {
        	$normalized = $requested.Trim() -replace '^[vV]', ''
        	$tag = $normalized.ToLowerInvariant()
        	if ($tag -in @("latest", "beta", "canary", "next", "rc")) {
        		$package = "@bitwarden/cli@$tag"
        	} elseif ($normalized -match '^\d+\.\d+\.\d+([-+.][0-9A-Za-z.-]+)?$') {
        		$package = "@bitwarden/cli@$normalized"
        	} else {
        		Write-Error "Refusing unsafe @bitwarden/cli version spec: '$requested'"
        		exit 1
        	}
        }

        $cacheRoot = if ($env:RUNNER_TOOL_CACHE) {
        	$env:RUNNER_TOOL_CACHE
        } else { $env:RUNNER_TEMP }

        $prefix = Join-Path $cacheRoot "bitwarden-cli"
        New-Item -ItemType Directory -Force -Path $prefix | Out-Null

        npm install --global --ignore-scripts --prefix $prefix $package
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        $binDir = if ($IsWindows) {
        	$prefix
        } else { Join-Path $prefix "bin" }
        $env:PATH = "$binDir$([IO.Path]::PathSeparator)$env:PATH"

        $binRoot = [IO.Path]::GetFullPath($binDir).TrimEnd([IO.Path]::DirectorySeparatorChar, [IO.Path]::AltDirectorySeparatorChar)
        $commands = Get-Command bw -All -ErrorAction Stop
        $installedCommands = $commands | Where-Object {
        	if (-not $_.Source) { $false } else {
        		$source = [IO.Path]::GetFullPath($_.Source)
        		$source -eq $binRoot -or $source.StartsWith("$binRoot$([IO.Path]::DirectorySeparatorChar)", [StringComparison]::OrdinalIgnoreCase)
        	}
        }

        $bwCommand = (
        	$installedCommands |
        		Where-Object CommandType -eq Application |
        		Select-Object -First 1
        ) ?? ($installedCommands | Select-Object -First 1)

        if (-not $bwCommand) { throw "installed bw was not found in $binDir" }

        $bw = $bwCommand.Source
        $versionOutput = & $bw --version
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

        $version = [string]$versionOutput

        $binDir | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

        @"
        version=$version
        bin-dir=$binDir
        bin=$bw
        "@ | Tee-Object -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

        "Bitwarden CLI $version installed at $binDir"
